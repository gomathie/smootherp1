; Performance tuning for running DekaERP from a Windows bind mount.
; Mounted into the Sail container at /etc/php/8.4/cli/conf.d/99-dekaerp.ini.
;
; opcache.enable_cli is required because Sail serves HTTP through
; `php artisan serve` (CLI SAPI) — without it nothing is opcode-cached.
; revalidate_freq=60 means code changes are picked up within 60 seconds;
; run `docker compose restart laravel.test` to pick them up immediately.

opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=512
opcache.interned_strings_buffer=64
opcache.max_accelerated_files=130000
opcache.validate_timestamps=1
opcache.revalidate_freq=60

realpath_cache_size=16M
realpath_cache_ttl=600
